<!--
    To insert JavaScript into an HTML page, you use the <script>  element.
    In the <script> element, we use the alert() function to display the Hello, World! message.
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript Hello World Example</title>
    <script>
      alert("Hello, World!");
    </script>
  </head>
  <body>
    <h1>Welcome to JavaScript tutorial</h1>
  </body>
</html>
